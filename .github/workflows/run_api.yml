name: Run ChatGPT API

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Start API and Tunnel
      run: ./run_github.sh
